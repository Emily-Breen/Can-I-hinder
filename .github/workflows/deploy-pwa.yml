name: Deploy PWA (Vite + Express) to Azure Web App

on:
  push:
    branches: ["main"]
    paths:
      - "PWA/can-i-hinder-app/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: PWA/can-i-hinder-app
        run: npm ci

      - name: Build
        working-directory: PWA/can-i-hinder-app
        run: npm run build

      - name: Zip deployment package
        run: |
          cd PWA/can-i-hinder-app
          zip -r ../../pwa-deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "can-i-hinder-pwa"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISH_PROFILE_PWA }}
          package: "pwa-deploy.zip"